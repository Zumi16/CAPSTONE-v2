<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Head Dashboard - PUP Parañaque</title>
    <link rel="icon" type="image" href="/public/assets/images/PUPLogo.webp">
    <link rel="stylesheet" href="/private/css/layout/post.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <!--SIDEBAR-->
    <section class="sidebar">
        <div class="logo">
            <img class="logoimage" src="/public/assets/images/PUPLogo.webp" alt="PUP Logo">
            <div class="logotitlewrap">
                <h2 class="logotitle logotitle1">PUP</h2>

        <nav class="sidebar-nav">

                    <ul class="nav-list">
                        <li class="nav-item active">
                            <a class="nav-link" href="/private/html/adminPages/adminLlave/areaHead/areaHead.html">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/adminLlave/areaHead/myActivityLog.html">
                                <i class="fa-solid fa-history"></i>
                                <span>Activity Log</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/adminLlave/areaHead/statistics.html">
                                <i class="fa-solid fa-chart-bar"></i>
                                <span>Reports</span>
                            </a>

                    </ul>
                </div>

                <div class="nav-section">
                    <h3 class="nav-title">Resources</h3>
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showComingSoon()">
                                <i class="fa-solid fa-file-alt"></i>
                                <span>Guidelines</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="showComingSoon()">
                                <i class="fa-solid fa-question-circle"></i>
                                <span>Help</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name">Area Head</span>
                        <span class="user-role">Area Head</span>
                    </div>
                </div>
            </div>
        </nav>
    </section>

    <!--MAIN CONTENT-->
    <main class="main">
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="page-title" id="pageTitle">Area Head Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="notification-button">
                    <a class="notif-link" href="#notifications">
                        <i class="fa fa-bell" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="profile-button">
                    <a class="profile-link">
                        <i class="fa fa-user" aria-hidden="true"></i>
                    </a>
                </div>
            </div>
        </header>

        <!--DASHBOARD CONTENT-->
        <div class="main-content" id="mainContent">
            <!-- Content will be dynamically loaded here -->
        </div>

    <script src="/private/js/admin/profileFunction.js"></script>
    <script src="/private/js/admin/admiLlave/areaHead/areaHead.js"></script>
