<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - System Admin</title>
    <link rel="icon" type="image" href="/public/assets/images/PUPLogo.webp">
    <link rel="stylesheet" href="/private/css/layout/post.css">
    <link rel="stylesheet" href="/private/css/pages/secondaryUserManagement.css">
    <link rel="stylesheet" href="/private/css/layout/dashboardsidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!--SIDEBAR-->
    <section class="sidebar">
        <div class="logo">
            <img class="logoimage" src="/public/assets/images/PUPLogo.webp" alt="PUP Logo">
            <div class="logotitlewrap">
                <h2 class="logotitle logotitle1">PUP</h2>
                <h2 class="logotitle">Parañaque</h2>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <div class="sidebar-scroll">
                <div class="nav-section">
                    <h3 class="nav-title">Main</h3>
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryDashboard.html">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <h3 class="nav-title">Management</h3>
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryAnalytics.html">
                                <i class="fa-solid fa-chart-line"></i>
                                <span>Analytics Dashboard</span>
                            </a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryUserManagement.html">
                                <i class="fa-solid fa-users"></i>
                                <span>User Management</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryRoleManagement.html">
                                <i class="fa-solid fa-user-tag"></i>
                                <span>Role Management</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryFeedbackView.html">
                                <i class="fa-solid fa-comments"></i>
                                <span>Service Feedback</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/private/html/adminPages/secondarySuperAdmin/secondaryActivityLogs.html">
                                <i class="fa-solid fa-clipboard-list"></i>
                                <span>My Action Logs</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar backup">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name" id="currentAdminName"></span>
                        <span class="user-role"></span>
                    </div>
                </div>
            </div>
        </nav>
    </section>

    <!--MAIN CONTENT-->
    <main class="main">
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="page-title">User Management</h1>
                <span class="access-badge">Limited Access</span>
            </div>
            <div class="header-right">
                <div class="notification-button">
                    <a class="notif-link" href="#notifications">
                        <i class="fa fa-bell"></i>
                    </a>
                </div>
                <div class="profile-button">
                    <a class="profile-link">
                        <i class="fa fa-user"></i>
                    </a>
                </div>
            </div>
        </header>

        <!--DASHBOARD CONTENT-->
        <div class="main-content" id="mainContent">
            <!-- Content will be dynamically loaded here -->
        </div>
    </main>

<!-- SCRIPTS -->  
<script src="/private/js/admin/secondarySuperAdmin/secondaryUserManagement.js"></script>
<script src="/private/js/admin/profileFunction.js"></script>

</html>
