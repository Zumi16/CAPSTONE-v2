<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - OJT</title>
    <link rel="icon" type="image" href="/public/assets/images/PUPLogo.webp">
            <!-- alert-->
    <link rel="stylesheet" href="/private/css/layout/alert-system.css">
    <link rel="stylesheet" href="/private/css/pages/ojt.css">
    <link rel="stylesheet" href="/private/css/layout/post.css">
    <link rel="stylesheet" href="/private/css/layout/dashboardsidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
        <!--SIDEBAR-->
    <section class="sidebar">
        <div class="logo">
            <img class="logoimage" src="/public/assets/images/PUPLogo.webp" alt="PUP Logo">
            <div class="logotitlewrap">
                <h2 class="logotitle logotitle1">PUP</h2>
                <h2 class="logotitle">Parañaque</h2>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <div class="sidebar-scroll">
            <div class="nav-section">
                <h3 class="nav-title">Main</h3>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminAve/admin1.html">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <h3 class="nav-title">Management</h3>
                <ul class="nav-list">
                    <li class="nav-item active">
                        <a class="nav-link" href="/private/html/adminPages/adminAve/ojt.html">
                            <i class="fa-solid fa-briefcase"></i>
                            <span>OJT</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminAve/research&extension.html">
                            <i class="fa-solid fa-book"></i>
                            <span>Research & Extension</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminAve/nstp.html">
                            <i class="fa-solid fa-handshake-angle"></i>
                            <span>NSTP</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminAve/forms-repository.html">
                            <i class="fa-brands fa-wpforms"></i>
                            <span>Forms Repository</span>
                        </a>
                    </li>
                </ul>
            </div>
            </div> <!-- End of sidebar-scroll -->


            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name">Admin Avegail</span>
                    </div>
                </div>
            </div>
        </nav>
    </section>

        <!--MAIN CONTENT-->
    <main class="main">
        <!--TOP-->
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="page-title" id="pageTitle">OJT</h1>
            </div>
            <div class="header-right">
                <div class="notification-button">
                    <a class="notif-link" href="#notifications" data-page="overview">
                    <i class="fa fa-bell" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="profile-button">
                    <a class="profile-link" data-page="profile">
                    <i class="fa fa-user" aria-hidden="true"></i>
                    </a>
                </div>
            </div>
        </header>
            <!--DASHBOARD CONTENT-->
            <div class="main-content" id="mainContent">
                
                <div class="post-container">
                    <div class="post-feed" id="postFeed">
                        <div class="post-placeholder">
                        </div>
                    </div>

                    <!-- Post Button -->
                    <button class="post-btn" id="openPostModal">
                        <i class="fa-solid fa-plus"></i>
                    </button>

                    <!-- Post Modal -->
                    <div class="post-modal" id="postModal">
                    <div class="post-modal-content">
                        <h2>Create a Post</h2>

                        <!-- Title Input -->
                        <input type="text" id="postTitle" placeholder="Enter title..." class="post-title" />

                        <!-- Toolbar -->
                        <div class="post-toolbar">
                        <button data-command="bold"><i class="fa-solid fa-bold"></i></button>
                        <button data-command="italic"><i class="fa-solid fa-italic"></i></button>
                        <button data-command="underline"><i class="fa-solid fa-underline"></i></button>
                        <button data-command="highlight"><i class="fa-solid fa-highlighter"></i></button>
                        <select id="fontSize">
                            <option value="3">Normal</option>
                            <option value="4">Large</option>
                            <option value="5">Larger</option>
                            <option value="6">Huge</option>
                        </select>
                        </div>

                        <!-- Rich Text Area -->
                        <div id="postText" class="post-editor" contenteditable="true" placeholder="Write your post..."></div>

                        <!-- File Upload -->
                        <div class="file-upload-section">
                          <label for="fileUpload" class="file-upload-label">
                            <i class="fa fa-paperclip"></i> Attach Files (Max 3)
                          </label>
                          <input type="file" id="fileUpload" multiple accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.txt">
                          <div id="fileList" class="file-list"></div>
                        </div>

                        <!-- Buttons -->
                        <div class="post-modal-actions">
                        <button id="cancelPost">Cancel</button>
                        <button id="submitPost">Post</button>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
            <!-- Trash Modal -->
            <div class="trash-modal" id="trashModal" style="display: none;">
            <div class="trash-modal-content">
                <div class="trash-modal-header">
                <h2><i class="fa fa-trash"></i> Trash</h2>
                <button class="close-trash-btn" id="closeTrashBtn">
                    <i class="fa fa-times"></i>
                </button>
                </div>
                
                <div class="trash-modal-body">
                <div class="trash-actions">
                    <p class="trash-info">
                    <i class="fa fa-info-circle"></i>
                    Items in trash will be kept for 30 days before automatic deletion
                    </p>
                    <button class="empty-trash-btn" id="emptyTrashBtn">
                    <i class="fa fa-trash-alt"></i> Empty Trash
                    </button>
                </div>
                
                <div class="trash-items" id="trashItems">
                    <!-- Trash items will be loaded here -->
                </div>
                </div>
            </div>
            </div>

            <!-- Trash Button (Add this near your existing post button) -->
            <button class="trash-btn" id="openTrashBtn" title="View Trash">
            <i class="fa fa-trash"></i>
            </button>
    </main>
    <!-- SCRIPTS -->
<script src="/private/js/alert-system.js"></script>
<script src="/private/js/admin/admin1/admin1.js"></script>
<script src="/private/js/admin/profileFunction.js"></script>
<script src="/private/js/admin/admin1/ojt.js"></script>
</body>
</html>
