<!-- analyticsReport.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Analytics Report</title>
    <link rel="icon" type="image" href="/public/assets/images/PUPLogo.webp">
    <link rel="stylesheet" href="/private/css/layout/post.css">
    <link rel="stylesheet" href="/private/css/pages/analyticsReport.css">
    <link rel="stylesheet" href="/private/css/layout/dashboardsidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
        <!--SIDEBAR-->
    <section class="sidebar">
        <div class="logo">
            <img class="logoimage" src="/public/assets/images/PUPLogo.webp" alt="PUP Logo">
            <div class="logotitlewrap">
                <h2 class="logotitle logotitle1">PUP</h2>
                <h2 class="logotitle">Parañaque</h2>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <div class="sidebar-scroll">
            <div class="nav-section">
                <h3 class="nav-title">Main</h3>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminEnierga/admin2.html">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <h3 class="nav-title">Management</h3>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminEnierga/dataUploads.html">
                            <i class="fa-solid fa-copy"></i>
                            <span>Data Uploads</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list">
                    <li class="nav-item active">
                        <a class="nav-link" href="/private/html/adminPages/adminEnierga/analyticsReport.html">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Analytics Report</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="/private/html/adminPages/adminEnierga/fileRepository.html">
                            <i class="fa-solid fa-box-archive"></i>
                            <span>File Repository</span>
                        </a>
                    </li>
                </ul>


            </div>
            </div> <!-- End of sidebar-scroll -->


            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name">Admin Enierga</span>
                    </div>
                </div>
            </div>
        </nav>
    </section>

        <!--MAIN CONTENT-->
    <main class="main">
        <!--TOP-->
        <header class="dashboard-header">
            <div class="header-left">
                <h1 class="page-title" id="pageTitle">Analytics Report</h1>
            </div>
            <div class="header-right">
                <div class="notification-button">
                    <a class="notif-link" href="#notifications" data-page="overview">
                    <i class="fa fa-bell" aria-hidden="true"></i>
                    </a>
                </div>
                <div class="profile-button">
                    <a class="profile-link" data-page="profile">
                    <i class="fa fa-user" aria-hidden="true"></i>
                    </a>
                </div>

        </header>
            <!--DASHBOARD CONTENT-->
            <div class="main-content" id="mainContent">
                <section class="summary-cards">
                <div class="summary-card">
                    <div class="summary-card-content">
                    <div class="summary-text">
                        <p class="summary-label">Total Reports</p>
                        <p class="summary-value">24</p>
                    </div>
                    <div class="summary-icon bg-blue">
                        <i class="bi bi-file-earmark-text"></i>
                    </div>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-card-content">
                    <div class="summary-text">
                        <p class="summary-label">Total Students Tracked</p>
                        <p class="summary-value">1,562</p>
                    </div>
                    <div class="summary-icon bg-green">
                        <i class="bi bi-people"></i>
                    </div>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-card-content">
                    <div class="summary-text">
                        <p class="summary-label">Most Recent Report</p>
                        <p class="summary-value">Student Progress</p>
                    </div>
                    <div class="summary-icon bg-purple">
                        <i class="bi bi-clock-history"></i>
                    </div>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-card-content">
                    <div class="summary-text">
                        <p class="summary-label">Active Courses</p>
                        <p class="summary-value">4 Programs</p>
                    </div>
                    <div class="summary-icon bg-orange">
                        <i class="bi bi-mortarboard"></i>
                    </div>
                    </div>
                </div>
                </section>

                <section class="reports-section">
                <div class="reports-header">
                    <div class="search-filter">
                    <input type="text" placeholder="Search reports..." class="search-input">
                    <select class="filter-select">
                        <option>All Types</option>
                        <option>CSV</option>
                        <option>XLSX</option>
                        <option>JSON</option>
                    </select>
                    </div>
                    <button class="export-btn">
                    <i class="bi bi-download"></i> Export All
                    </button>
                </div>

                <div class="reports-grid"></div>
                </section>
            </div>

            <!-- Modal Structure -->
            <div id="reportModal">
                <div class="modal-overlay"></div>
                    <div class="modal-content">
                        <button class="close-modal">&times;</button>
                    <div class="report-details"></div>
                </div>
            </div>

    </main>
<div id="toastContainer" class="toast-container"></div>
    <!-- SCRIPTS -->
<script src="/private/js/toast.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/private/js/admin/admin2/admin2.js"></script>
<script src="/private/js/admin/profileFunction.js"></script>
<script src="/private/js/admin/admin2/analyticsReport.js"></script>
</body>
</html>
